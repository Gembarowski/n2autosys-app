<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>N2 AutoSYS — Sistema de Sistemas para Controle Automotivo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0f1117;--bg1:#161b24;--bg2:#1e2535;--bg3:#252e3f;
  --border:#2a3347;--border2:#334060;
  --text:#e8edf5;--text2:#8899b0;--text3:#556070;
  --green:#E8A020;--green2:#C8881A;--green3:#9A6510;--greenbg:#2A1E05;
  --amber:#f5a623;--amberbg:#2a1f0a;
  --red:#e05252;--redbg:#2a0f0f;
  --blue:#4a9eff;--bluebg:#0a1a2a;
  --purple:#a78bfa;--purplebg:#1a1030;
  --lime:#b8f542;--limebg:#2A1E05;
  font-family:'Barlow',sans-serif;
}
body{background:var(--bg0);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg0);padding:24px;position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(232,160,32,.12) 0%,transparent 70%);pointer-events:none}
.login-wrap::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(184,245,66,.07) 0%,transparent 70%);pointer-events:none}
.login-box{background:var(--bg1);border:1px solid var(--border2);border-radius:18px;padding:40px 36px;width:100%;max-width:400px;position:relative;z-index:1}
.login-logo{display:flex;align-items:center;gap:11px;margin-bottom:32px;justify-content:center}
.login-logo-icon{width:40px;height:40px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-icon svg{width:22px;height:22px;fill:#0f1117}
.login-brand{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.login-heading{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px;text-align:center}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-err{background:var(--redbg);border:1px solid #4a1f1f;color:var(--red);border-radius:8px;padding:10px 13px;font-size:12px;margin-bottom:14px;display:none}
.lf{margin-bottom:14px}
.ll{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block}
.li{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:14px;color:var(--text);font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s}
.li:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(232,160,32,.12)}
.li::placeholder{color:var(--text3)}
.login-btn{width:100%;background:var(--green);color:#0f1117;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;margin-top:4px;transition:background .15s}
.login-btn:hover{background:var(--green2)}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:18px;line-height:1.7}

/* ── APP SHELL ── */
.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:9px;flex-shrink:0;letter-spacing:-.01em}
.logo-icon{width:28px;height:28px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;fill:#0f1117}
.nav{display:flex;gap:2px;flex-wrap:wrap}
.nb{background:none;border:1px solid transparent;border-radius:7px;padding:5px 11px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Barlow',sans-serif}
.nb:hover{background:var(--bg2);color:var(--text);border-color:var(--border)}
.nb.active{background:var(--bg3);color:var(--text);border-color:var(--border2);font-weight:600}
.nb.highlight{border-color:var(--lime);color:var(--lime)}
.nb.highlight:hover{background:var(--limebg)}
.user-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-badge{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:5px 11px;cursor:pointer}
.user-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0f1117;flex-shrink:0}
.user-name{font-size:12px;color:var(--text);font-weight:500}
.role-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.logout-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'Barlow',sans-serif}
.logout-btn:hover{background:var(--redbg);color:var(--red);border-color:#4a1f1f}
.content{padding:18px;flex:1}
.sec{display:none}.sec.active{display:block}

/* ── CARDS / STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.sc{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.sc-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.sc-val{font-size:22px;font-weight:800;color:var(--text);font-family:'Barlow Condensed',sans-serif}
.sc-sub{font-size:10px;color:var(--text3);margin-top:2px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:11px;padding:17px;margin-bottom:13px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:8px;flex-wrap:wrap}
.row-between h3{font-size:13px;font-weight:600;color:var(--text)}

/* ── BTNS ── */
.btn-p{background:var(--green);color:#0f1117;border:none;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-weight:700;white-space:nowrap;transition:background .15s;font-family:'Barlow',sans-serif}
.btn-p:hover{background:var(--green2)}
.btn-g{background:none;border:1px solid var(--border2);border-radius:7px;padding:7px 14px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'Barlow',sans-serif}
.btn-g:hover{background:var(--bg2);color:var(--text)}
.btn-lime{background:var(--lime);color:#0f1117;border:none;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-weight:700;font-family:'Barlow',sans-serif}
.btn-lime:hover{background:#9fd935}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:'Barlow',sans-serif;transition:all .1s}
.btn-sm:hover{background:var(--bg2);color:var(--text)}
.btn-sm.g{color:var(--green);border-color:var(--green3)}.btn-sm.g:hover{background:var(--greenbg)}
.btn-sm.r{color:var(--red);border-color:#4a1f1f}.btn-sm.r:hover{background:var(--redbg)}
.btn-sm.b{color:var(--blue);border-color:#1a3a5a}.btn-sm.b:hover{background:var(--bluebg)}
.btn-sm.p{color:var(--purple);border-color:#3a2a6a}.btn-sm.p:hover{background:var(--purplebg)}
.btn-sm.l{color:var(--lime);border-color:#3a5010}.btn-sm.l:hover{background:var(--limebg)}

/* ── FORMS ── */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow.full{grid-template-columns:1fr}.frow.three{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
input,select,textarea{font-family:'Barlow',sans-serif;font-size:12px;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;width:100%;transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(232,160,32,.12)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:64px}

/* ── VEHICLE CARDS ── */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:11px}
.vcard{background:var(--bg1);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .15s}
.vcard:hover{border-color:var(--border2)}
.vimg{background:var(--bg2);height:110px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.vimg img{width:100%;height:100%;object-fit:cover}
.vimg svg{width:44px;height:44px;opacity:.14;fill:var(--text)}
.badge{position:absolute;top:7px;right:7px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.bd{background:var(--greenbg);color:var(--green);border:1px solid var(--green3)}
.bv{background:var(--redbg);color:var(--red);border:1px solid #4a1f1f}
.br{background:var(--amberbg);color:var(--amber);border:1px solid #4a3010}
.vbadge-vis{position:absolute;top:7px;left:7px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--limebg);color:var(--lime);border:1px solid #3a5010}
.vinfo{padding:11px 13px}
.vname{font-size:13px;font-weight:800;color:var(--text);font-family:'Barlow Condensed',sans-serif}
.vdetail{font-size:11px;color:var(--text2);margin-top:3px}
.vprice{font-size:16px;font-weight:800;color:var(--green);margin-top:6px;font-family:'Barlow Condensed',sans-serif}
.vseller{font-size:11px;color:var(--purple);margin-top:3px}
.vactions{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap}

/* ── TIMELINE / DOCS ── */
.tl{display:flex;flex-direction:column;gap:7px}
.tl-item{display:flex;gap:10px;align-items:flex-start;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-g{background:var(--green)}.dot-a{background:var(--amber)}.dot-r{background:var(--red)}.dot-l{background:var(--lime)}
.tl-name{font-size:12px;font-weight:600;color:var(--text)}
.tl-sub{font-size:11px;color:var(--text2);margin-top:1px}
.tl-date{font-size:10px;color:var(--text3);margin-top:3px}
.doc-list{display:flex;flex-direction:column;gap:6px}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
.ds{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.ds-ok{background:var(--greenbg);color:var(--green)}.ds-pend{background:var(--amberbg);color:var(--amber)}.ds-miss{background:var(--redbg);color:var(--red)}

/* ── SELLERS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.scard{background:var(--bg1);border:1px solid var(--border);border-radius:11px;padding:14px;transition:border-color .15s}
.scard:hover{border-color:var(--border2)}
.s-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0f1117;margin-bottom:9px}
.s-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:9px}
.s-stat{background:var(--bg2);border-radius:7px;padding:6px 8px;text-align:center}
.s-stat-v{font-size:13px;font-weight:700;color:var(--text);font-family:'Barlow Condensed',sans-serif}
.s-stat-l{font-size:9px;color:var(--text3);margin-top:1px}
.com-badge{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--purplebg);color:var(--purple);border:1px solid #3a2a6a;margin-top:5px;font-weight:600}
.rank-item{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;margin-bottom:6px}
.rank-n{font-size:13px;font-weight:700;color:var(--text3);min-width:20px;text-align:center}
.rank-n.gold{color:var(--amber)}.rank-n.silver{color:#8899b0}.rank-n.bronze{color:#cd7f32}
.rank-av{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0f1117;flex-shrink:0}

/* ── USERS TABLE ── */
.utbl{width:100%;border-collapse:collapse;font-size:12px}
.utbl th{text-align:left;padding:7px 10px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
.utbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}

/* ── LINK BLOCKS ── */
.link-block{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px}
.plat-lbl{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.link-row{display:flex;gap:6px}.link-row input{flex:1}
.open-btn{background:var(--greenbg);color:var(--green);border:1px solid var(--green3);border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:700;font-family:'Barlow',sans-serif}
.open-btn:hover{background:var(--green3)}

/* ── VISTORIA IMPORT ── */
.vis-import-box{background:var(--bg1);border:1.5px solid var(--lime);border-radius:12px;padding:18px;margin-bottom:16px}
.vis-import-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--lime);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.vis-import-sub{font-size:12px;color:var(--text2);margin-bottom:14px}
.vis-code-area{width:100%;background:var(--bg0);border:1px solid var(--border2);border-radius:8px;padding:10px;font-size:12px;color:var(--text2);font-family:'Courier New',monospace;min-height:80px;resize:vertical;outline:none;transition:border-color .15s}
.vis-code-area:focus{border-color:var(--lime)}
.pending-list{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.pending-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;gap:8px;flex-wrap:wrap}
.pending-info{flex:1}
.pending-name{font-size:13px;font-weight:600;color:var(--text)}
.pending-meta{font-size:11px;color:var(--text2);margin-top:2px}
.pending-score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.vis-score-good{background:var(--greenbg);color:var(--green)}
.vis-score-mid{background:var(--amberbg);color:var(--amber)}
.vis-score-bad{background:var(--redbg);color:var(--red)}

/* ── MISC ── */
.sel-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.sel-veh{font-size:12px;flex:1;min-width:160px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.rel-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rel-bar-lbl{font-size:12px;color:var(--text2);min-width:80px;white-space:nowrap}
.rel-bar-track{flex:1;background:var(--bg3);border-radius:20px;height:6px;overflow:hidden}
.rel-bar-fill{height:100%;border-radius:20px}
.rel-bar-val{font-size:12px;font-weight:600;color:var(--text);min-width:20px;text-align:right}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;display:none}
.modal{background:var(--bg1);border-radius:13px;border:1px solid var(--border2);padding:22px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:15px;padding-bottom:11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1;font-family:'Barlow',sans-serif}
.close-btn:hover{color:var(--text)}

/* ── TOAST ── */
.mono{font-family:"JetBrains Mono",monospace!important;font-size:11px;letter-spacing:.04em}
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#0f1117;padding:10px 17px;border-radius:9px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-family:'Barlow',sans-serif}
.toast.show{opacity:1}
.no-access{text-align:center;padding:60px 20px}
.tag-chip{display:inline-flex;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
</style>
</head>
<body>

<!-- ══ LOGIN ═══════════════════════════════════════════════════ -->
<div id="login-wrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
      <span class="login-brand" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:-.01em">N2 <span style="color:var(--green)">AutoSYS</span></span>
    </div>
    <div class="login-heading">Bem-vindo de volta</div>
    <div class="login-sub" style="font-family:'Barlow',sans-serif">Faça login para acessar o sistema</div>
    <div class="login-err" id="login-err">Usuário ou senha incorretos.</div>
    <div class="lf"><label class="ll">Usuário</label><input class="li" id="lu" placeholder="seu.usuario" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="lf"><label class="ll">Senha</label><input class="li" id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" onclick="doLogin()" id="login-btn-el">Entrar no sistema</button>
    <div class="login-hint" style="font-family:'Barlow',sans-serif">N2 AutoSYS — Sistemas para Controle Automotivo</div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════════════════ -->
<div id="app" class="app">
  <div class="topbar" id="topbar">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:-.01em">N2 <span style="color:var(--green)">AutoSYS</span></span>
    </div>
    <div class="nav" id="main-nav"></div>
    <div class="user-area">
      <div class="user-badge" onclick="showSec('perfil')">
        <div class="user-avatar" id="tb-av"></div>
        <div><div class="user-name" id="tb-name"></div><div class="role-tag" id="tb-role"></div></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="mo" onclick="closeMO(event)">
  <div class="modal"><div class="modal-title"><span id="mt"></span><button class="close-btn" onclick="closeMD()">×</button></div><div id="mb"></div></div>
</div>

<script>
'use strict';
// ══ STORAGE ═══════════════════════════════════════════════════

// ── URL do servidor N2 AutoSYS ────────────────────────────────────
const API_URL='https://n2autosys-backend.onrender.com';

// ── Slug fixo para esta empresa ───────────────────────────────────
function getTenantSlug(){
  return 'n2autosys_nickel';
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  if(!u||!p){const e=document.getElementById('login-err');e.textContent='Preencha usuário e senha.';e.style.display='block';setTimeout(()=>e.style.display='none',3000);return}

  const btn=document.querySelector('.login-btn');
  const origText=btn.textContent;
  btn.textContent='⏳ Conectando...';btn.disabled=true;
  btn.style.opacity='0.7';

  // Mostra aviso de carregamento
  const errEl2=document.getElementById('login-err');
  errEl2.style.background='var(--greenbg)';
  errEl2.style.borderColor='var(--green3)';
  errEl2.style.color='var(--green)';
  errEl2.textContent='Conectando ao servidor... (pode levar até 60s na primeira vez)';
  errEl2.style.display='block';

  try{
    // Tenta login no servidor real
    const resp=await fetch(API_URL+'/api/auth/login',{
      mode:'cors',
      method:'POST',
      headers:{'Content-Type':'application/json','X-Tenant-Slug':getTenantSlug()},
      body:JSON.stringify({username:u,password:p})
    });

    if(resp.ok){
      const data=await resp.json();
      // Salva token e dados do servidor
      const serverUser={
        id:data.user.id,
        username:data.user.username,
        nome:data.user.nome,
        email:data.user.email||'',
        cargo:data.user.cargo,
        telefone:data.user.telefone||'',
        fromServer:true,
        token:data.token,
        empresaId:data.empresa?.id,
        empresaNome:data.empresa?.nome,
      };
      localStorage.setItem('ag4_jwt',data.token);
      localStorage.setItem('ag4_tenant',getTenantSlug());
      CU=serverUser;setSess(serverUser);
      document.getElementById('login-wrap').style.display='none';
      document.getElementById('app').style.display='flex';
      initApp();
      return;
    }

    // Servidor retornou erro (credenciais inválidas)
    const err=await resp.json();
    const errEl=document.getElementById('login-err');
    errEl.textContent=err.error||'Usuário ou senha incorretos.';
    errEl.style.display='block';
    setTimeout(()=>errEl.style.display='none',3000);

  }catch(networkErr){
    // Servidor offline — tenta login local (fallback)
    console.warn('Servidor indisponível, usando login local:', networkErr.message);
    const user=getUsers().find(x=>x.username===u&&x.password===p);
    if(!user){
      const errEl=document.getElementById('login-err');
      errEl.textContent='Usuário ou senha incorretos.';
      errEl.style.display='block';
      setTimeout(()=>errEl.style.display='none',3000);
    }else{
      CU=user;setSess(user);
      document.getElementById('login-wrap').style.display='none';
      document.getElementById('app').style.display='flex';
      initApp();
      toast('⚠️ Modo offline — servidor indisponível','#f5a623');
    }
  }finally{
    btn.textContent=origText;
    btn.disabled=false;
    btn.style.opacity='1';
    // Reseta estilo do aviso
    const errReset=document.getElementById('login-err');
    errReset.style.background='';
    errReset.style.borderColor='';
    errReset.style.color='';
    if(errReset.textContent.includes('Conectando'))errReset.style.display='none';
  }
}

function doLogout(){
  clrSess();CU=null;
  localStorage.removeItem('ag4_jwt');
  document.getElementById('app').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('lu').value='';document.getElementById('lp').value='';
}

// ── Requisição autenticada ao servidor ────────────────────────────
async function apiRequest(method,path,body){
  const token=localStorage.getItem('ag4_jwt')||CU?.token;
  const tenant=getTenantSlug();
  const opts={
    method,
    headers:{
      'Content-Type':'application/json',
      'X-Tenant-Slug':tenant,
      ...(token?{'Authorization':'Bearer '+token}:{})
    },
  };
  if(body&&method!=='GET')opts.body=JSON.stringify(body);
  const resp=await fetch(API_URL+path,opts);
  if(resp.status===401){toast('Sessão expirada — faça login novamente','#e05252');doLogout();return null;}
  return resp.json();
}

function initApp(){

  if(CU.fromServer&&CU.empresaNome){
    setTimeout(()=>{

      if(topbar&&!document.getElementById('empresa-badge')){
        const badge=document.createElement('div');

        badge.style.cssText='font-size:10px;font-weight:600;color:var(--green);background:var(--greenbg);border:1px solid var(--green3);border-radius:20px;padding:2px 10px;white-space:nowrap';
        badge.textContent='🏢 '+CU.empresaNome;
        topbar.insertBefore(badge,topbar.querySelector('.user-area'));

    },100);
  }
  const av=document.getElementById('tb-av');
  av.textContent=initials(CU.nome);av.style.background=role.color;
  document.getElementById('tb-name').textContent=CU.nome;
  const rb=document.getElementById('tb-role');rb.textContent=role.label;rb.style.background=role.bg;rb.style.color=role.color;

  NAV_ORDER.filter(s=>can(s)).forEach(s=>{
    const b=document.createElement('button');
    b.className='nb'+(s==='vistoria'?' highlight':'');
    b.textContent=NAV_LABELS[s];b.onclick=()=>showSec(s);nav.appendChild(b);

function showSec(id){
  if(!can(id)){document.getElementById('main-content').innerHTML='<div class="no-access"><div style="font-size:40px;margin-bottom:12px">🔒</div><div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">Acesso restrito</div><div style="font-size:13px;color:var(--text3)">Você não tem permissão para este módulo.</div></div>';return}
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.textContent===NAV_LABELS[id]));
  const c=document.getElementById('main-content');c.innerHTML='';
  const sec=document.createElement('div');sec.id='sec-'+id;sec.className='sec active';c.appendChild(sec);
  RENDERS[id]&&RENDERS[id](sec);
}

function filterEst(){
  const q=(document.getElementById('est-s')?.value||'').toLowerCase();
  const fs=document.getElementById('est-st')?.value||'';
  const veiculos=load(KV).filter(v=>{
    const m=!q||(v.marca+v.modelo+(v.placa||'')+(v.cor||'')).toLowerCase().includes(q);
    return m&&(!fs||v.status===fs);
  });
  const grid=document.getElementById('est-grid');if(!grid)return;
  const isTk=t=>t==='Caminhão'||t==='Van'||t==='Implemento';
  if(!veiculos.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1">Nenhum veículo encontrado.<br/>Clique em "+ Veículo" para cadastrar.</div>';return}
  grid.innerHTML=veiculos.map(v=>{
    const capa=getFotoCapa(v.id);
    const img=capa?`<img src="${capa}" alt=""/>`:`<svg viewBox="0 0 24 24">${isTk(v.tipo)?'<path d="M20 8h-3L14 4H9L6 8H3C2 8 1 9 1 10v9h1c0 1.1.9 2 2 2s2-.9 2-2h8c0 1.1.9 2 2 2s2-.9 2-2h1V10c0-1-1-2-2-2zm-9-2h2l2 2H9l2-2zm-7 4h16v3H4v-3z"/>':'<path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM5 11l1.5-4.5h11L19 11H5z"/>'}</svg>`;
    const seller=v.vendedorId?getSellerName(v.vendedorId):null;
    const acts=[
      can('cadastro')?`<button class="btn-sm" onclick="editVeh('${v.id}')">Editar</button>`:'',
      can('vendedores')?`<button class="btn-sm p" onclick="atribuirV('${v.id}')">Vendedor</button>`:'',
      can('fotos')?`<button class="btn-sm" onclick="irFotos('${v.id}')">Fotos</button>`:'',
      can('documentos')?`<button class="btn-sm" onclick="irDocs('${v.id}')">Docs</button>`:'',
      can('vendas')?`<button class="btn-sm g" onclick="irVenda('${v.id}')">Venda</button>`:'',
      can('anuncios')?`<button class="btn-sm b" onclick="irAnuncio('${v.id}')">Anúncio</button>`:'',
      can('vendas')?`<button class="btn-sm b" onclick="gerarContrato('${v.id}')">Contrato</button>`:'',
      (CU?.cargo==='admin'||CU?.cargo==='gerente')?`<button class="btn-sm r" onclick="excluirVeh('${v.id}')">×</button>`:''
    ].filter(Boolean).join('');
    return`<div class="vcard">
      <div class="vimg">${img}
        <span class="badge ${statusBadge(v.status)}">${statusLabel(v.status)}</span>
        ${v.fromVistoria?'<span class="vbadge-vis">⚡ Vistoria</span>':''}
      </div>
      <div class="vinfo">
        <div class="vname">${v.marca} ${v.modelo} ${v.ano}</div>
        <div class="vdetail">${v.avaria||''}${v.km?' · '+v.km+' km':''}${v.cor?' · '+v.cor:''}</div>
        <div class="vprice">${fmtR(v.valorVenda)}</div>
        ${seller?`<div class="vseller">👤 ${seller}</div>`:''}
        <div class="vactions">${acts}</div>
      </div></div>`;
  }).join('');
}

async function excluirVeh(id){
  if(!confirm('Excluir este veículo? As fotos e documentos também serão removidos.'))return;
  if(CU?.fromServer){
    try{
      // 1. Busca fotos do veículo no servidor e remove do Cloudinary
      const fotosData=await apiRequest('GET',`/api/cloudinary/fotos/${id}`);
      const fotos=fotosData?.fotos||[];
      if(fotos.length>0){
        toast(`Removendo ${fotos.length} foto(s)...`);
        for(const f of fotos){
          await apiRequest('DELETE',`/api/cloudinary/foto/${f.id}`).catch(()=>{});
        }
      }
      // 2. Deleta o veículo no servidor
      await apiRequest('DELETE','/api/veiculos/'+id);
    }catch(e){console.warn('Erro ao excluir no servidor:',e.message);}
  }
  // 3. Limpa localStorage
  save(KV,load(KV).filter(x=>x.id!==id));
  save(KF,load(KF).filter(f=>f.veiculoId!==id));
  save(KD,load(KD).filter(d=>d.veiculoId!==id));
  toast('Veículo excluído');filterEst();
}

function importarCodigo(){
  const code=document.getElementById('vis-code-input')?.value.trim();
  if(!code){toast('Cole o código primeiro','#e05252');return}
  try{
    const json=JSON.parse(decodeURIComponent(escape(atob(code))));
    if(!json.marca||!json.modelo){toast('Código inválido ou corrompido','#e05252');return}
    confirmarImport(json);
  }catch(e){toast('Código inválido — verifique se copiou corretamente','#e05252')}
}

function importarPending(idx){

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:var(--text2)">

      ${data.descAvaria?`<div style="margin-top:8px;font-size:11px;color:var(--text2);line-height:1.5"><b>Descrição:</b> ${data.descAvaria}</div>`:''}

      <div class="fg"><div class="fl">Valor de venda (R$)</div><input id="imp-venda" value="${data.valorVenda||''}" placeholder="58.000"/></div>
    </div>
    <div class="frow" style="margin-bottom:10px">
      <div class="fg"><div class="fl">Status</div><select id="imp-status"><option value="disponivel">Disponível</option><option value="vendido">Vendido</option></select></div>
      <div class="fg"><div class="fl">Vendedor responsável</div><select id="imp-seller"><option value="">Sem vendedor</option>${selOpts}</select></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-lime" style="flex:1;padding:10px" onclick="confirmarImportFinal('${btoa(unescape(encodeURIComponent(JSON.stringify(data))))}')">✓ Confirmar e cadastrar</button>
      <button class="btn-g" onclick="closeMD()">Cancelar</button>
    </div>`);
}

function confirmarImportFinal(encodedData){
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(encodedData))));
    const vid=uid();
    const v={
      id:vid,tipo:data.tipo||'Automóvel',marca:data.marca,modelo:data.modelo,ano:data.ano,
      cor:data.cor||'',placa:data.placa||'',km:data.km||'',chassi:data.chassi||'',
      local:data.local||'',avaria:data.avaria||'Outros danos',dano:data.dano||'Moderado',
      descAvaria:(data.descAvaria||'')+(data.recomendacoes?'\n\nRecomendações: '+data.recomendacoes:''),
      valorCompra:document.getElementById('imp-compra')?.value.trim()||'',
      valorVenda:document.getElementById('imp-venda')?.value.trim()||'',
      status:document.getElementById('imp-status')?.value||'disponivel',
      vendedorId:document.getElementById('imp-seller')?.value||null,
      obs:`Vistoria: ${data.id||'—'} · Vistoriador: ${data.vistoriador||'—'} · Score: ${data.score||0}pts · ${data.checkOk||0} OK / ${data.checkNok||0} NOK`,
      fromVistoria:true,vistoriaId:data.id||'',vistoriador:data.vistoriador||'',
      vistoriaScore:data.score||0,criadoEm:new Date().toLocaleDateString('pt-BR'),
    };
    const lista=load(KV);lista.unshift(v);save(KV,lista);
    // Remove from pending if present
    try{
      const pending=JSON.parse(localStorage.getItem('ag3_pending_vistorias')||'[]');
      const filtered=pending.filter(p=>p.id!==data.id);
      localStorage.setItem('ag3_pending_vistorias',JSON.stringify(filtered));
    }catch{}
    closeMD();
    toast('Veículo importado com sucesso! ⚡');
    showSec('estoque');
  }catch(e){toast('Erro ao importar: '+e.message,'#e05252')}
}

    <div style="display:flex;gap:8px;margin-top:14px">

function removerPending(idx){
  if(!confirm('Remover esta vistoria pendente?'))return;
  const pending=JSON.parse(localStorage.getItem('ag3_pending_vistorias')||'[]');
  pending.splice(idx,1);localStorage.setItem('ag3_pending_vistorias',JSON.stringify(pending));
  toast('Removido');showSec('vistoria');
}

function limparPending(){
  if(!confirm('Limpar todas as vistorias pendentes?'))return;
  localStorage.removeItem('ag3_pending_vistorias');toast('Pendências limpas');showSec('vistoria');
}

async function salvarVeh(){
  const editId=document.getElementById('edit-id').value;
  const v={tipo:document.getElementById('f-tipo').value,marca:document.getElementById('f-marca').value.trim(),
    modelo:document.getElementById('f-modelo').value.trim(),ano:document.getElementById('f-ano').value,
    cor:document.getElementById('f-cor').value.trim(),placa:document.getElementById('f-placa').value.trim().toUpperCase(),
    km:document.getElementById('f-km').value.trim(),chassi:document.getElementById('f-chassi').value.trim(),
    local_patio:document.getElementById('f-local').value.trim(),avaria:document.getElementById('f-avaria').value,
    nivel_dano:document.getElementById('f-dano').value,desc_avaria:document.getElementById('f-descavaria').value.trim(),
    valor_compra:document.getElementById('f-compra').value.trim(),valor_venda:document.getElementById('f-venda').value.trim(),
    status:document.getElementById('f-status').value,obs:document.getElementById('f-obs').value.trim()};
  if(!v.marca||!v.modelo||!v.ano){toast('Preencha marca, modelo e ano','#e05252');return}

  if(CU?.fromServer){
    try{
      const resp=editId
        ? await apiRequest('PUT','/api/veiculos/'+editId,v)
        : await apiRequest('POST','/api/veiculos',v);
      if(resp?.veiculo){
        // Atualiza cache local
        const lista=load(KV);
        const idx=lista.findIndex(x=>x.id===resp.veiculo.id);
        if(idx>=0)lista[idx]=resp.veiculo;else lista.unshift(resp.veiculo);
        save(KV,lista);
        toast('Veículo salvo!');showSec('estoque');return;
      }
      toast(resp?.error||'Erro ao salvar','#e05252');return;
    }catch(e){toast('Erro de conexão — salvando localmente','#f5a623');}
  }
  // Fallback local
  const id=editId||uid();
  v.id=id;v.criadoEm=new Date().toLocaleDateString('pt-BR');
  const lista=load(KV);const idx=lista.findIndex(x=>x.id===id);
  const old=idx>=0?lista[idx]:null;if(old)v.vendedorId=old.vendedorId||null;
  if(idx>=0)lista[idx]=v;else lista.unshift(v);save(KV,lista);
  toast('Veículo salvo!');showSec('estoque');
}

function editVeh(id){
  const v=load(KV).find(x=>x.id===id);if(!v)return;showSec('cadastro');
  setTimeout(()=>{
    document.getElementById('edit-id').value=v.id;
    document.getElementById('form-title').textContent='Editando — '+v.marca+' '+v.modelo;
    document.getElementById('f-tipo').value=v.tipo||'Automóvel';
    document.getElementById('f-marca').value=v.marca||'';

function renderFotos(sec){
  const vs=load(KV);
  sec.innerHTML=`<div class="sel-row">
    <select class="sel-veh" id="fvs" onchange="loadFotosVeh(this.value)">
      <option value="">— Selecione um veículo —</option>
      ${vs.map(v=>`<option value="${v.id}">${v.marca} ${v.modelo} ${v.ano}${v.placa?' — '+v.placa:''}</option>`).join('')}
    </select>
    <label class="btn-p" style="cursor:pointer;display:flex;align-items:center;gap:6px">
      📷 + Fotos
      <input type="file" id="foto-inp" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="uploadFotos()"/>
    </label>
  </div>
  <div id="foto-area"><div class="empty-state">Selecione um veículo para ver as fotos</div></div>`;
}
async function loadFotosVeh(vid){
  const sel=document.getElementById('fvs');if(sel&&vid)sel.value=vid;
  const area=document.getElementById('foto-area');if(!area||!vid)return;
  area.innerHTML=`<div class="empty-state">Carregando fotos...</div>`;
  try{
    if(CU?.fromServer){
      const data=await apiRequest('GET',`/api/cloudinary/fotos/${vid}`);
      const fotos=data?.fotos||[];
      renderGradeFotos(area,fotos,vid,true);
    } else {
      const fotos=load(KF).filter(f=>f.veiculoId===vid);
      renderGradeFotos(area,fotos,vid,false);
    }
  }catch(e){area.innerHTML=`<div class="empty-state">Erro ao carregar fotos</div>`;}
}
function renderGradeFotos(area,fotos,vid,isServer){
  const grid=fotos.length?`<div class="photo-grid">${fotos.map(f=>{
    const src=isServer?f.url:f.data;
    return `<div style="position:relative">
      <img src="${src}" class="photo-thumb" onclick="verFotoURL('${src}','${f.nome||'Foto'}')" style="cursor:pointer"/>
      <button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;border-radius:4px;color:white;font-size:11px;cursor:pointer;padding:2px 7px" onclick="excluirFoto('${f.id}','${vid}',${isServer})">×</button>
    </div>`;
  }).join('')}</div>`:`<div style="color:var(--text3);font-size:12px;padding:4px">Nenhuma foto cadastrada</div>`;
  area.innerHTML=`<div class="card">
    <div class="card-title">Fotos <span style="font-size:11px;font-weight:400;color:var(--text3)">${fotos.length} foto(s)</span></div>
    ${grid}
    <p style="font-size:11px;color:var(--text3);margin-top:8px">A primeira foto é usada como capa no estoque. Formatos: JPG, PNG, WebP (máx. 15MB).</p>
  </div>`;
}
async function uploadFotos(){
  const inp=document.getElementById('foto-inp');
  const vid=document.getElementById('fvs')?.value;
  if(!vid){toast('Selecione um veículo','#e05252');return}
  if(!inp.files.length)return;
  if(CU?.fromServer){
    const files=Array.from(inp.files);
    toast(`Enviando ${files.length} foto(s)...`);
    const token=localStorage.getItem('ag4_jwt')||CU?.token;
    const tenant=getTenantSlug();
    const fd=new FormData();
    files.forEach(f=>fd.append('fotos',f));
    try{
      const resp=await fetch(`${API_URL}/api/cloudinary/fotos/${vid}`,{
        method:'POST',
        headers:{'X-Tenant-Slug':tenant,'Authorization':'Bearer '+token},
        body:fd
      });
      const data=await resp.json();
      if(resp.ok){toast(`${data.total} foto(s) enviada(s)! ✓`);loadFotosVeh(vid);}
      else toast(data.error||'Erro no upload','#e05252');
    }catch(e){toast('Erro ao enviar fotos','#e05252');}
  } else {
    Array.from(inp.files).forEach(f=>{
      const r=new FileReader();r.onload=e=>{
        try{const lista=load(KF);lista.push({id:uid(),veiculoId:vid,data:e.target.result,nome:f.name});save(KF,lista);loadFotosVeh(vid);toast('Foto salva!')}
        catch{toast('Foto muito grande para armazenamento local','#e05252')}
      };r.readAsDataURL(f);
    });
  }
  inp.value='';
}
function verFotoURL(src,nome){openModal(nome,`<img src="${src}" style="width:100%;border-radius:8px;border:1px solid var(--border)"/>`);}
function verFoto(id){const f=load(KF).find(x=>x.id===id);if(!f)return;verFotoURL(f.data,f.nome||'Foto');}
async function excluirFoto(id,vid,isServer){
  if(!confirm('Remover foto?'))return;
  if(isServer){
    const data=await apiRequest('DELETE',`/api/cloudinary/foto/${id}`);
    if(data?.message||!data?.error){toast('Foto removida');loadFotosVeh(vid);}
    else toast(data.error||'Erro ao remover','#e05252');
  } else {
    save(KF,load(KF).filter(f=>f.id!==id));toast('Foto removida');loadFotosVeh(vid);
  }
}

async function salvarDoc(vid){
  const tipo=document.getElementById('md-n').value,outro=document.getElementById('md-o').value.trim();
  const pdfInp=document.getElementById('md-pdf');
  const pdfFile=pdfInp?.files[0]||null;
  const nomeDoc=tipo==='Outro'&&outro?outro:tipo;
  let pdfUrl=null,pdfNome=pdfFile?pdfFile.name:'';
  if(pdfFile&&CU?.fromServer){
    toast('Enviando PDF...');
    const token=localStorage.getItem('ag4_jwt')||CU?.token;
    const tenant=getTenantSlug();
    const fd=new FormData();
    fd.append('pdf',pdfFile);
    fd.append('nomeDoc',nomeDoc);
    try{
      const resp=await fetch(`${API_URL}/api/cloudinary/pdf/${vid}`,{
        method:'POST',
        headers:{'X-Tenant-Slug':tenant,'Authorization':'Bearer '+token},
        body:fd
      });
      const data=await resp.json();
      if(resp.ok){pdfUrl=data.url;pdfNome=data.nome;}
      else{toast(data.error||'Erro ao enviar PDF','#e05252');return;}
    }catch(e){toast('Erro ao enviar PDF','#e05252');return;}
  }
  const doc={id:uid(),veiculoId:vid,nome:nomeDoc,status:document.getElementById('md-s').value,obs:document.getElementById('md-ob').value.trim(),pdfNome,pdfUrl};
  const lista=load(KD);lista.push(doc);save(KD,lista);closeMD();toast('Documento salvo!');loadDocsVeh(vid);
}
function excluirDoc(id,vid){if(!confirm('Remover?'))return;save(KD,load(KD).filter(d=>d.id!==id));toast('Removido');loadDocsVeh(vid)}

function calcCDisplay(){
  const sid=document.getElementById('vf-s')?.value,val=document.getElementById('vf-v')?.value;
  const s=load(KS).find(x=>x.id===sid);const com=s?parseR(val)*(parseFloat(s.comissao||0)/100):0;
  const el=document.getElementById('vf-c');if(el)el.value=s&&com>0?'R$ '+com.toLocaleString('pt-BR',{minimumFractionDigits:2}):'—';
}
async function salvarVenda(vid){
  const comprador=document.getElementById('vf-n').value.trim();
  if(!comprador){toast('Informe o comprador','#e05252');return}
  const sid=document.getElementById('vf-s').value,valor=document.getElementById('vf-v').value.trim();
  const s=load(KS).find(x=>x.id===sid);const com=s?parseR(valor)*(parseFloat(s.comissao||0)/100):0;

  const vendaData={veiculo_id:vid,comprador_nome:comprador,
    comprador_doc:document.getElementById('vf-d').value.trim(),
    comprador_tel:document.getElementById('vf-t').value.trim(),
    data_venda:document.getElementById('vf-dt').value,
    valor,pagamento:document.getElementById('vf-p').value,
    vendedor_id:sid||null,comissao_paga:com,
    obs:document.getElementById('vf-ob').value.trim()};

  if(CU?.fromServer){
    try{
      const resp=await apiRequest('POST','/api/vendas',vendaData);
      if(resp?.venda){
        // Atualiza cache local
        const venda={id:resp.venda.id,veiculoId:vid,comprador,documento:vendaData.comprador_doc,
          telefone:vendaData.comprador_tel,data:vendaData.data_venda,valor,
          pagamento:vendaData.pagamento,vendedorId:sid||null,comissaoPaga:com,
          obs:vendaData.obs,registradoEm:new Date().toLocaleDateString('pt-BR')};
        const lista=load(KVN).filter(x=>x.veiculoId!==vid);lista.unshift(venda);save(KVN,lista);
        const veiculos=load(KV);const idx=veiculos.findIndex(x=>x.id===vid);
        if(idx>=0){veiculos[idx].status='vendido';save(KV,veiculos);}
        toast('Venda registrada!');showSec('vendas');return;
      }
      toast(resp?.error||'Erro ao registrar venda','#e05252');return;
    }catch(e){toast('Erro de conexão — salvando localmente','#f5a623');}
  }
  // Fallback local
  const venda={id:uid(),veiculoId:vid,comprador,documento:vendaData.comprador_doc,
    telefone:vendaData.comprador_tel,data:vendaData.data_venda,valor,
    pagamento:vendaData.pagamento,vendedorId:sid||null,comissaoPaga:com,
    obs:vendaData.obs,registradoEm:new Date().toLocaleDateString('pt-BR')};
  const lista=load(KVN).filter(x=>x.veiculoId!==vid);lista.unshift(venda);save(KVN,lista);
  const veiculos=load(KV);const idx=veiculos.findIndex(x=>x.id===vid);
  if(idx>=0){veiculos[idx].status='vendido';if(sid)veiculos[idx].vendedorId=sid;save(KV,veiculos)}
  toast('Venda registrada!');showSec('vendas');
}

async function salvarV(){
  const nome=document.getElementById('sv-n').value.trim();if(!nome){toast('Informe o nome','#e05252');return}
  const editId=document.getElementById('sv-id').value;
  const sData={nome,cargo:document.getElementById('sv-c').value.trim(),
    telefone:document.getElementById('sv-t').value.trim(),
    email:document.getElementById('sv-e').value.trim(),
    comissao:document.getElementById('sv-com').value,
    cpf:document.getElementById('sv-cpf').value.trim()};

  if(CU?.fromServer){
    try{
      const resp=editId
        ? await apiRequest('PUT','/api/vendedores/'+editId,sData)
        : await apiRequest('POST','/api/vendedores',sData);
      if(resp?.vendedor){
        const s={...sData,id:resp.vendedor.id,criadoEm:new Date().toLocaleDateString('pt-BR')};
        const lista=load(KS);const idx=lista.findIndex(x=>x.id===s.id);
        if(idx>=0)lista[idx]=s;else lista.push(s);
        save(KS,lista);closeMD();toast('Vendedor salvo!');showSec('vendedores');return;
      }
      toast(resp?.error||'Erro ao salvar vendedor','#e05252');return;
    }catch(e){toast('Erro de conexão — salvando localmente','#f5a623');}
  }
  const id=editId||uid();
  const s={id,nome,...sData,criadoEm:new Date().toLocaleDateString('pt-BR')};
  const lista=load(KS);const idx=lista.findIndex(x=>x.id===id);
  if(idx>=0)lista[idx]=s;else lista.push(s);
  save(KS,lista);closeMD();toast('Vendedor salvo!');showSec('vendedores');
}

function exportarExcel(){
  const v=load(KV),sellers=load(KS);if(!v.length){toast('Nenhum veículo','#e05252');return}
  const headers=['Tipo','Marca','Modelo','Ano','Cor','Placa','Km','Avaria','Valor Compra','Valor Venda','Vendedor','Vistoria','Status'];
  const rows=v.map(x=>{const s=sellers.find(y=>y.id===x.vendedorId);return[x.tipo,x.marca,x.modelo,x.ano,x.cor,x.placa,x.km,x.avaria,x.valorCompra,x.valorVenda,s?s.nome:'',x.fromVistoria?'Sim':'Não',statusLabel(x.status)]});
  const esc=c=>'"'+(c||'').toString().replace(/"/g,'""')+'"';
  const csv='\uFEFF'+[headers,...rows].map(r=>r.map(esc).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='autogestao_estoque.csv';a.click();URL.revokeObjectURL(url);
  toast('Planilha exportada!');
}

    <div class="fg"><div class="fl">E-mail</div><input id="cu-e" value="${u?.email||''}" placeholder="joao@empresa.com"/></div></div>
    <div class="frow" style="margin-bottom:14px"><div class="fg"><div class="fl">Cargo / Acesso *</div>
      <select id="cu-c">${Object.keys(ROLES).map(r=>`<option value="${r}" ${u?.cargo===r?'selected':''}>${ROLES[r].label}</option>`).join('')}</select>
    </div>
    <div class="fg"><div class="fl">Telefone</div><input id="cu-t" value="${u?.telefone||''}" placeholder="(41) 99999-0000"/></div></div>
    <div style="display:flex;gap:8px"><button class="btn-p" onclick="salvarU()">Salvar</button><button class="btn-g" onclick="closeMD()">Cancelar</button></div>`);
}
async function salvarU(){
  const nome=document.getElementById('cu-n').value.trim();
  const username=document.getElementById('cu-u').value.trim().toLowerCase();
  const senha=document.getElementById('cu-p').value;
  const editId=document.getElementById('cu-id').value;
  if(!nome||!username){toast('Preencha nome e usuário','#e05252');return}
  if(!editId&&!senha){toast('Informe a senha','#e05252');return}

  const uData={
    nome, username,
    email:document.getElementById('cu-e').value.trim(),
    cargo:document.getElementById('cu-c').value,
    telefone:document.getElementById('cu-t').value.trim(),
    ...(senha?{senha}:{})
  };

  if(CU?.fromServer){
    try{
      const resp=editId
        ? await apiRequest('PUT','/api/usuarios/'+editId,uData)
        : await apiRequest('POST','/api/usuarios',uData);
      if(resp?.usuario){
        toast('Usuário salvo!');closeMD();showSec('usuarios');return;
      }
      if(resp?.error){toast(resp.error,'#e05252');return;}
    }catch(e){toast('Erro de conexão — salvando localmente','#f5a623');}
  }
  // Fallback local
  const id=editId||uid();
  const users=getUsers();const existing=users.find(x=>x.id===id);
  const u={id,nome,username,password:senha||(existing?.password||''),
    email:uData.email,cargo:uData.cargo,telefone:uData.telefone,
    criadoEm:existing?.criadoEm||new Date().toLocaleDateString('pt-BR')};
  if(!u.password){toast('Informe a senha','#e05252');return}
  const idx=users.findIndex(x=>x.id===id);if(idx>=0)users[idx]=u;else users.push(u);
  save(KU,users);closeMD();toast('Usuário salvo!');showSec('usuarios');
}
async function excluirU(id){
  if(id===CU?.id){toast('Não pode excluir seu próprio usuário','#e05252');return}
  if(!confirm('Excluir usuário?'))return;
  if(CU?.fromServer){
    try{await apiRequest('DELETE','/api/usuarios/'+id);}
    catch(e){console.warn('Erro ao excluir no servidor');}
  }
  save(KU,load(KU).filter(x=>x.id!==id));
  toast('Usuário excluído');showSec('usuarios');
}

// ── Backup completo JSON ───────────────────────────────────────────
function exportarBackupCompleto(){
  const data={
    version:'autogestao-backup-v1',
    empresa:CU?.nome||'empresa',
    geradoPor:CU?.username||'—',
    geradoEm:new Date().toISOString(),
    data:{
      veiculos:load(KV),
      vendas:load(KVN),
      vendedores:load(KS),
      documentos:load(KD),
      anuncios:load(KA),
      fotos:load(KF),
      usuarios:getUsers().map(u=>({...u,password:undefined,senha_hash:undefined})),
    },
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ts=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`autogestao-backup-${ts}.json`;a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('ag4_last_backup',Date.now().toString());
  toast('Backup completo baixado com sucesso! 💾');
}

// ── Exportar fotos como ZIP ────────────────────────────────────────
async function exportarFotosZip(){
  const fotos=load(KF);const veiculos=load(KV);
  if(!fotos.length){toast('Nenhuma foto para exportar','#e05252');return}
  toast('Preparando ZIP das fotos...');

  // Gera HTML com todas as fotos organizadas por veículo (fallback sem JSZip)
  const grupos={};
  fotos.forEach(f=>{
    const v=veiculos.find(x=>x.id===f.veiculoId);
    const key=v?`${v.marca} ${v.modelo} ${v.ano} (${v.placa||'sem placa'})`:'Sem veículo';
    if(!grupos[key])grupos[key]=[];
    grupos[key].push(f);
  });

  let html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
  <title>Fotos N2 AutoSYS — ${new Date().toLocaleDateString('pt-BR')}</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f1117;color:#e8edf5;padding:24px;margin:0}

    .fcard img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
    .fname{font-size:10px;color:#8899b0;padding:6px 8px;text-align:center}
    .footer{margin-top:32px;font-size:11px;color:#556070;text-align:center}
    @media print{body{background:white;color:black}.vtitle{background:#f0f3fa;color:#0a0e1a}}
  </style></head><body>
  <h1>📷 Fotos dos Veículos — N2 AutoSYS</h1>
  <div class="sub">Gerado em ${new Date().toLocaleString('pt-BR')} · ${fotos.length} foto(s) · ${Object.keys(grupos).length} veículo(s)</div>`;

    html+=`<div class="vgroup"><div class="vtitle">🚗 ${vName} — ${fs.length} foto(s)</div><div class="grid">`;

  const blob=new Blob([html],{type:'text/html'});

  const a=document.createElement('a');
  a.href=url;a.download=`autogestao-fotos-${new Date().toISOString().slice(0,10)}.html`;a.click();
  URL.revokeObjectURL(url);
  toast('Arquivo de fotos baixado! Abra no navegador para visualizar.');
}

// ── Helpers CSV ───────────────────────────────────────────────────
function csvDownload(filename,headers,rows){
  const esc=c=>'"'+(c===null||c===undefined?'':String(c).replace(/"/g,'""'))+'"';
  const csv='\uFEFF'+[headers,...rows].map(r=>r.map(esc).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
  toast(`${filename} exportado!`);
}

// ── Restaurar backup ──────────────────────────────────────────────
function restaurarBackup(input){
  if(!input.files.length)return;
  if(!confirm('⚠️ Restaurar o backup irá SUBSTITUIR todos os dados atuais.\n\nTem certeza que deseja continuar?'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const raw=JSON.parse(e.target.result);
      if(raw.version!=='autogestao-backup-v1'){toast('Arquivo inválido — não é um backup do N2 AutoSYS','#e05252');return}
      const d=raw.data;
      if(d.veiculos)  save(KV,d.veiculos);
      if(d.vendas)    save(KVN,d.vendas);
      if(d.vendedores)save(KS,d.vendedores);
      if(d.documentos)save(KD,d.documentos);
      if(d.anuncios)  save(KA,d.anuncios);
      if(d.fotos)     save(KF,d.fotos);
      toast(`Backup restaurado! ${d.veiculos?.length||0} veículos, ${d.vendas?.length||0} vendas.`);
      setTimeout(()=>showSec('estoque'),800);
    }catch(err){toast('Erro ao ler o arquivo: '+err.message,'#e05252')}
  };
  reader.readAsText(input.files[0]);
  input.value='';
}

  const veiculos=load(KV);const orcs=load(KOR);
  const o=id?orcs.find(x=>x.id===id):null;
  const hoje=new Date();const valDefault=new Date(hoje.setDate(hoje.getDate()+15)).toISOString().slice(0,10);
  openModal('Novo orçamento de venda',`
    <input type="hidden" id="oid" value="${o?.id||''}"/>
    <div class="frow"><div class="fg"><div class="fl">Nome do cliente *</div><input id="oc-nome" value="${o?.nomeCliente||''}" placeholder="João da Silva"/></div>
    <div class="fg"><div class="fl">Telefone</div><input id="oc-tel" value="${o?.telefone||''}" placeholder="(41) 99999-0000"/></div></div>
    <div class="frow"><div class="fg"><div class="fl">E-mail</div><input id="oc-email" value="${o?.email||''}" placeholder="joao@email.com"/></div>
    <div class="fg"><div class="fl">CPF / CNPJ</div><input id="oc-doc" value="${o?.documento||''}" placeholder="000.000.000-00"/></div></div>
    <div class="frow"><div class="fg"><div class="fl">Veículo ofertado</div>
      <select id="oc-veh">
        <option value="">Sem vínculo de estoque</option>
        ${veiculos.filter(v=>v.status==='disponivel').map(v=>`<option value="${v.id}" ${o?.veiculoId===v.id?'selected':''}>${v.marca} ${v.modelo} ${v.ano} — ${fmtR(v.valorVenda)}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><div class="fl">Valor ofertado (R$) *</div><input id="oc-valor" type="text" value="${o?.valor||''}" placeholder="58.000"/></div></div>
    <div class="frow"><div class="fg"><div class="fl">Validade do orçamento</div><input id="oc-val" type="date" value="${o?.validade||valDefault}"/></div>
    <div class="fg"><div class="fl">Status</div>
      <select id="oc-st"><option value="pendente" ${!o||o.status==='pendente'?'selected':''}>Pendente</option><option value="aprovado" ${o?.status==='aprovado'?'selected':''}>Aprovado</option><option value="recusado" ${o?.status==='recusado'?'selected':''}>Recusado</option></select>
    </div></div>
    <div class="frow full"><div class="fg"><div class="fl">Condições e observações</div>
      <textarea id="oc-obs" style="min-height:80px" placeholder="Descreva as condições da venda, forma de pagamento, itens incluídos, prazo de entrega...">${o?.obs||''}</textarea>

    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn-p" onclick="salvarOrcamento()">Salvar orçamento</button>
      <button class="btn-g" onclick="closeMD()">Cancelar</button>
    </div>`);
}

function editarOrcamento(id){openNovoOrcamento(id)}

function salvarOrcamento(){
  const nome=document.getElementById('oc-nome')?.value.trim();
  const valor=document.getElementById('oc-valor')?.value.trim();
  if(!nome){toast('Informe o nome do cliente','#e05252');return}
  if(!valor){toast('Informe o valor ofertado','#e05252');return}
  const id=document.getElementById('oid').value||uid();
  const o={id,nomeCliente:nome,telefone:document.getElementById('oc-tel').value.trim(),
    email:document.getElementById('oc-email').value.trim(),documento:document.getElementById('oc-doc').value.trim(),
    veiculoId:document.getElementById('oc-veh').value||null,valor,
    validade:document.getElementById('oc-val').value,
    status:document.getElementById('oc-st').value,
    obs:document.getElementById('oc-obs').value.trim(),
    criadoEm:new Date().toLocaleDateString('pt-BR')};
  const lista=load(KOR);const idx=lista.findIndex(x=>x.id===id);
  if(idx>=0)lista[idx]=o;else lista.unshift(o);
  save(KOR,lista);closeMD();toast('Orçamento salvo!');showSec('orcamentos');
}

function mudarStatusOrc(id,status){
  const lista=load(KOR);const idx=lista.findIndex(x=>x.id===id);
  if(idx<0)return;lista[idx].status=status;save(KOR,lista);
  toast(status==='aprovado'?'Orçamento aprovado!':'Orçamento recusado.');showSec('orcamentos');
}

function excluirOrc(id){
  if(!confirm('Excluir este orçamento?'))return;
  save(KOR,load(KOR).filter(x=>x.id!==id));toast('Orçamento excluído');showSec('orcamentos');
}

  <div class="section"><h2>Dados do cliente</h2>
  <p>Nome: <b>${o.nomeCliente}</b></p>
  ${o.documento?`<p>CPF/CNPJ: ${o.documento}</p>`:''}
  ${o.telefone?`<p>Telefone: ${o.telefone}</p>`:''}
  ${o.email?`<p>E-mail: ${o.email}</p>`:''}
  </div>
  ${v?`<div class="section"><h2>Veículo ofertado</h2>
  <p><b>${v.tipo} ${v.marca} ${v.modelo} ${v.ano}</b></p>
  <p>Cor: ${v.cor||'—'} · Placa: ${v.placa||'—'} · Km: ${v.km||'—'}</p>

  ${v.descAvaria?`<p>Descrição: ${v.descAvaria}</p>`:''}

  <div class="section"><h2>Valor da proposta</h2>
  <div class="val">${fmtR(o.valor)}</div>

  const a=document.createElement('a');a.href=url;a.download=`orcamento-${o.nomeCliente.replace(/\s+/g,'-')}.html`;a.click();
  URL.revokeObjectURL(url);toast('Orçamento gerado! Abra e imprima como PDF.');

function filtrarSeguros(){
  const q=(document.getElementById('seg-search')?.value||'').toLowerCase();
  const ft=document.getElementById('seg-filter-tipo')?.value||'';
  const lista=load(KSEG).filter(s=>{
    const m=!q||((s.placa||'')+(s.marca||'')+(s.modelo||'')+(s.nomeSegurado||'')+(s.apolice||'')+(s.seguradora||'')).toLowerCase().includes(q);
    const ft2=!ft||s.tipoApolice===ft;
    return m&&ft2;
  });
  const el=document.getElementById('seg-lista');
  if(el)el.innerHTML=renderListaSeguros(lista);
}

function salvarSeguro(){
  const placa=document.getElementById('sg-placa')?.value.trim().toUpperCase();
  const nome=document.getElementById('sg-nome')?.value.trim();

  const tipo=document.getElementById('sg-tipo')?.value;
  if(!placa){toast('Informe a placa do veículo','#e05252');return}
  if(!nome){toast('Informe o nome do associado','#e05252');return}
  if(!seg){toast('Informe a associação','#e05252');return}
  const id=document.getElementById('sid').value||uid();
  const s={
    id,placa,
    marca:document.getElementById('sg-marca').value.trim(),
    modelo:document.getElementById('sg-modelo').value.trim(),
    ano:document.getElementById('sg-ano').value,
    cor:document.getElementById('sg-cor').value.trim(),
    chassi:document.getElementById('sg-chassi').value.trim(),
    nomeSegurado:nome,
    cpfSegurado:document.getElementById('sg-cpf').value.trim(),
    telSegurado:document.getElementById('sg-tel').value.trim(),
    seguradora:seg,
    apolice:document.getElementById('sg-apolice').value.trim(),
    tipoApolice:tipo,
    inicioVigencia:document.getElementById('sg-ini').value,
    fimVigencia:document.getElementById('sg-fim').value,
    coberturas:document.getElementById('sg-cob').value.trim(),
    obs:document.getElementById('sg-obs').value.trim(),
    criadoEm:new Date().toLocaleDateString('pt-BR')
  };
  const lista=load(KSEG);const idx=lista.findIndex(x=>x.id===id);
  if(idx>=0)lista[idx]=s;else lista.unshift(s);
  save(KSEG,lista);closeMD();toast('Veículo associado cadastrado!');showSec('seguradora');
}

function excluirSeguro(id){
  if(!confirm('Excluir este registro de seguro?'))return;
  save(KSEG,load(KSEG).filter(x=>x.id!==id));
  toast('Registro excluído');showSec('seguradora');
}

const sess=getSess();
if(sess){CU=sess;document.getElementById('login-wrap').style.display='none';document.getElementById('app').style.display='flex';initApp()}
</script>
